spring:
  application:
    name: "configserver"
  profiles:
    active: git
  #    active: "native"
  cloud:
    config:
      server:
        #        native:
        #          search-locations: "file:///Users//Admin//microservices//config"
        #          search-locations: "classpath:/config"
        git:
          uri: "https://github.com/hiendat04/microservices-config.git"
          default-label: "main"
          timeout: 5
          clone-on-start: true
          force-pull: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

encrypt:
  key: ")b81*}Qge7Hd$5Fs"

server:
  port: 8071
